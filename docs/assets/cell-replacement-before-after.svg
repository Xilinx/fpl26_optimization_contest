<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 380" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#e05555"/>
    </marker>
    <marker id="arr-grn" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#44bb66"/>
    </marker>
    <pattern id="grid-l" width="30" height="30" patternUnits="userSpaceOnUse">
      <rect width="30" height="30" fill="none" stroke="#334" stroke-width="0.5"/>
    </pattern>
    <pattern id="grid-r" width="30" height="30" patternUnits="userSpaceOnUse">
      <rect width="30" height="30" fill="none" stroke="#334" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="780" height="380" rx="12" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="390" y="35" text-anchor="middle" fill="white" font-weight="bold" font-size="18">Cell Re-Placement: Before vs. After</text>

  <!-- === LEFT PANEL: BEFORE === -->
  <text x="195" y="65" text-anchor="middle" fill="#e05555" font-weight="bold" font-size="15">BEFORE</text>
  <text x="195" y="82" text-anchor="middle" fill="#999" font-size="11">Long routing detour</text>

  <!-- Grid area -->
  <rect x="30" y="95" width="330" height="270" rx="6" fill="#12122a" stroke="#445" stroke-width="1"/>
  <rect x="30" y="95" width="330" height="270" rx="6" fill="url(#grid-l)"/>

  <!-- Cell B (top-left) -->
  <rect x="60" y="125" width="50" height="30" rx="5" fill="#4488cc"/>
  <text x="85" y="145" text-anchor="middle" fill="white" font-weight="bold" font-size="12">Cell B</text>

  <!-- Cell C (bottom-right of grid) -->
  <rect x="270" y="295" width="50" height="30" rx="5" fill="#4488cc"/>
  <text x="295" y="315" text-anchor="middle" fill="white" font-weight="bold" font-size="12">Cell C</text>

  <!-- Cell A (poorly placed - far right, middle) -->
  <rect x="280" y="145" width="50" height="30" rx="5" fill="#DD652C"/>
  <text x="305" y="165" text-anchor="middle" fill="white" font-weight="bold" font-size="12">Cell A</text>

  <!-- Long detour route from B to A -->
  <polyline points="110,140 150,140 150,115 250,115 250,160 278,160"
            fill="none" stroke="#e05555" stroke-width="2.5" stroke-dasharray="5,3" marker-end="url(#arr-red)"/>
  <text x="190" y="108" text-anchor="middle" fill="#e07777" font-size="10">long detour</text>

  <!-- Long detour route from A to C -->
  <polyline points="305,175 305,220 340,220 340,310 322,310"
            fill="none" stroke="#e05555" stroke-width="2.5" stroke-dasharray="5,3" marker-end="url(#arr-red)"/>
  <text x="348" y="260" text-anchor="middle" fill="#e07777" font-size="10" transform="rotate(90 348 260)">long detour</text>

  <!-- Centroid marker (ideal location, between B and C) -->
  <circle cx="170" cy="220" r="12" fill="none" stroke="#ffcc44" stroke-width="2" stroke-dasharray="4,2"/>
  <line x1="164" y1="220" x2="176" y2="220" stroke="#ffcc44" stroke-width="2"/>
  <line x1="170" y1="214" x2="170" y2="226" stroke="#ffcc44" stroke-width="2"/>
  <text x="170" y="248" text-anchor="middle" fill="#ffcc44" font-size="10">centroid</text>

  <!-- === RIGHT PANEL: AFTER === -->
  <text x="585" y="65" text-anchor="middle" fill="#44bb66" font-weight="bold" font-size="15">AFTER</text>
  <text x="585" y="82" text-anchor="middle" fill="#999" font-size="11">Short direct routes</text>

  <!-- Grid area -->
  <rect x="420" y="95" width="330" height="270" rx="6" fill="#12122a" stroke="#445" stroke-width="1"/>
  <rect x="420" y="95" width="330" height="270" rx="6" fill="url(#grid-r)"/>

  <!-- Cell B (same position) -->
  <rect x="450" y="125" width="50" height="30" rx="5" fill="#4488cc"/>
  <text x="475" y="145" text-anchor="middle" fill="white" font-weight="bold" font-size="12">Cell B</text>

  <!-- Cell C (same position) -->
  <rect x="660" y="295" width="50" height="30" rx="5" fill="#4488cc"/>
  <text x="685" y="315" text-anchor="middle" fill="white" font-weight="bold" font-size="12">Cell C</text>

  <!-- Cell A (moved to centroid) -->
  <rect x="535" y="205" width="50" height="30" rx="5" fill="#DD652C"/>
  <text x="560" y="225" text-anchor="middle" fill="white" font-weight="bold" font-size="12">Cell A</text>

  <!-- Short direct route from B to A -->
  <line x1="500" y1="143" x2="535" y2="213" stroke="#44bb66" stroke-width="2.5" marker-end="url(#arr-grn)"/>

  <!-- Short direct route from A to C -->
  <line x1="575" y1="230" x2="660" y2="303" stroke="#44bb66" stroke-width="2.5" marker-end="url(#arr-grn)"/>

  <!-- Centroid marker at Cell A's new position -->
  <circle cx="560" cy="220" r="20" fill="none" stroke="#ffcc44" stroke-width="1.5" stroke-dasharray="4,2"/>
</svg>
